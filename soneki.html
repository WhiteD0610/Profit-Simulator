<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品原価計算ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {}
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
    <div class="min-h-screen p-6">
        <div class="max-w-7xl mx-auto">
            <!-- ヘッダー -->
            <div class="mb-8">
                <h1 class="text-4xl font-bold text-slate-900 tracking-tight">商品原価計算ツール</h1>
                <p class="text-slate-600 mt-2">販売価格と原価から、利益と損益分岐点を自動計算します</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- 左側：入力フォーム -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <h2 class="text-lg font-semibold text-slate-900 mb-6">商品情報</h2>

                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">項目 <span class="text-red-500">*</span></label>
                                <input type="text" id="name" placeholder="例：Tシャツ、ケーキ" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">販売価格（税込）<span class="text-red-500">*</span></label>
                                <div class="relative">
                                    <input type="number" id="sellingPrice" placeholder="0" step="0.01" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    <span class="absolute right-3 top-2.5 text-slate-500">円</span>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">追加オプション料金</label>
                                <div class="relative">
                                    <input type="number" id="optionPrice" placeholder="0" step="0.01" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    <span class="absolute right-3 top-2.5 text-slate-500">円</span>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">1個あたりの原価（税込）<span class="text-red-500">*</span></label>
                                <div class="relative">
                                    <input type="number" id="unitCost" placeholder="0" step="0.01" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    <span class="absolute right-3 top-2.5 text-slate-500">円</span>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">容器など<br><span class="text-xs text-slate-500">仕入れ個数</span></label>
                                    <input type="number" id="containerCount" placeholder="100" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">容器など<br><span class="text-xs text-slate-500">ロット単価 *</span></label>
                                    <div class="relative">
                                        <input type="number" id="containerPrice" placeholder="0" step="0.01" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                                        <span class="absolute right-2 top-2 text-slate-500 text-xs">円</span>
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">設備費等</label>
                                <div class="relative">
                                    <input type="number" id="equipmentCost" placeholder="0" step="0.01" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                                    <span class="absolute right-3 top-2.5 text-slate-500">円</span>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">販売予想個数</label>
                                <input type="number" id="forecastQuantity" placeholder="0" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>
                        </div>

                        <button id="calcBtn" class="w-full mt-8 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors">試算する</button>
                    </div>
                </div>

                <!-- 右側：結果と履歴 -->
                <div class="lg:col-span-2 space-y-6">
                    <!-- 計算結果 -->
                    <div id="resultsContainer" class="hidden">
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                            <h2 class="text-lg font-semibold text-slate-900 mb-6">計算結果：<span id="resultName"></span></h2>

                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
                                <!-- 原価率 -->
                                <div class="bg-gradient-to-br from-orange-50 to-orange-100 rounded-lg p-4 border border-orange-200">
                                    <p class="text-sm text-orange-700 font-medium">原価率</p>
                                    <p class="text-2xl sm:text-3xl font-bold text-orange-600 mt-2 break-words" id="costRateResult">0%</p>
                                </div>

                                <!-- 損益分岐点 -->
                                <div class="bg-gradient-to-br from-blue-50 to-blue-100 rounded-lg p-4 border border-blue-200">
                                    <p class="text-sm text-blue-700 font-medium">損益分岐点</p>
                                    <p class="text-2xl sm:text-3xl font-bold text-blue-600 mt-2 break-words" id="breakEvenResult">0</p>
                                    <p class="text-xs text-blue-600 mt-1">個</p>
                                </div>

                                <!-- 利益 -->
                                <div id="profitContainer" class="hidden bg-gradient-to-br from-green-50 to-green-100 rounded-lg p-4 border border-green-200">
                                    <p class="text-sm text-green-700 font-medium">利益</p>
                                    <p class="text-2xl sm:text-3xl font-bold text-green-600 mt-2 break-words" id="profitResult">¥0</p>
                                </div>
                            </div>

                            <!-- 詳細情報 -->
                            <div class="pt-6 border-t border-slate-200">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                                    <div>
                                        <p class="text-slate-600">販売価格（税込）</p>
                                        <p class="font-semibold text-slate-900 break-words" id="detailSelling">¥0</p>
                                    </div>
                                    <div>
                                        <p class="text-slate-600">1個あたりの総原価</p>
                                        <p class="font-semibold text-slate-900 break-words" id="detailCost">¥0</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 履歴一覧 -->
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-lg font-semibold text-slate-900">計算履歴 (<span id="historyCount">0</span>)</h2>
                            <button id="clearAllBtn" class="hidden text-sm text-slate-600 hover:text-red-600 transition-colors">すべて削除</button>
                        </div>

                        <div id="historyList" class="space-y-3 max-h-96 overflow-y-auto">
                            <p class="text-center text-slate-500 py-8">計算履歴がありません</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let history = [];

        // ローカルストレージから履歴を読み込む
        function loadHistory() {
            try {
                const saved = localStorage.getItem('profitCalculatorHistory');
                if (saved) {
                    history = JSON.parse(saved);
                    renderHistory();
                }
            } catch (e) {
                console.error('履歴の読み込みエラー:', e);
            }
        }

        // 履歴をローカルストレージに保存
        function saveHistory() {
            try {
                localStorage.setItem('profitCalculatorHistory', JSON.stringify(history));
            } catch (e) {
                console.error('履歴の保存エラー:', e);
            }
        }

        // 試算ボタンの処理
        document.getElementById('calcBtn').addEventListener('click', function() {
            const name = document.getElementById('name').value.trim();
            const sellingPrice = parseFloat(document.getElementById('sellingPrice').value) || 0;
            const optionPrice = parseFloat(document.getElementById('optionPrice').value) || 0;
            const unitCost = parseFloat(document.getElementById('unitCost').value) || 0;
            const containerPrice = parseFloat(document.getElementById('containerPrice').value) || 0;
            const equipmentCost = parseFloat(document.getElementById('equipmentCost').value) || 0;
            const forecastQuantity = parseFloat(document.getElementById('forecastQuantity').value) || 0;

            // バリデーション
            if (!name) {
                alert('項目名を入力してください');
                return;
            }
            if (!sellingPrice || !unitCost || !containerPrice) {
                alert('必須項目（販売価格、原価、容器費）を入力してください');
                return;
            }

            // 計算
            const totalCostPerUnit = unitCost + containerPrice + optionPrice;
            const costRate = (totalCostPerUnit / sellingPrice) * 100;
            const profitPerUnit = sellingPrice - totalCostPerUnit;
            const breakEvenPoint = equipmentCost > 0 ? Math.ceil(equipmentCost / profitPerUnit) : 0;
            let profit = null;
            if (forecastQuantity > 0) {
                profit = (profitPerUnit * forecastQuantity) - equipmentCost;
            }

            // 結果を表示
            document.getElementById('resultName').textContent = name;
            document.getElementById('costRateResult').textContent = costRate.toFixed(1) + '%';
            document.getElementById('breakEvenResult').textContent = breakEvenPoint;
            document.getElementById('detailSelling').textContent = '¥' + sellingPrice.toLocaleString();
            document.getElementById('detailCost').textContent = '¥' + totalCostPerUnit.toFixed(2);

            if (profit !== null) {
                document.getElementById('profitContainer').classList.remove('hidden');
                const profitColor = profit >= 0 ? 'from-green-50 to-green-100' : 'from-red-50 to-red-100';
                const profitTextColor = profit >= 0 ? 'text-green-600' : 'text-red-600';
                document.getElementById('profitContainer').className = 'bg-gradient-to-br ' + profitColor + ' rounded-lg p-4 border ' + (profit >= 0 ? 'border-green-200' : 'border-red-200');
                document.getElementById('profitResult').className = 'text-2xl sm:text-3xl font-bold ' + profitTextColor + ' mt-2 break-words';
                document.getElementById('profitResult').textContent = '¥' + parseInt(profit).toLocaleString();
            } else {
                document.getElementById('profitContainer').classList.add('hidden');
            }

            document.getElementById('resultsContainer').classList.remove('hidden');

            // 履歴に追加
            const result = {
                id: Date.now(),
                timestamp: new Date().toLocaleString('ja-JP'),
                name: name,
                selling: sellingPrice,
                option: optionPrice,
                unitCost: unitCost,
                containerCost: containerPrice,
                equipment: equipmentCost,
                forecast: forecastQuantity,
                costRate: costRate.toFixed(1),
                breakEvenPoint: breakEvenPoint,
                profit: profit !== null ? profit.toFixed(0) : null
            };
            history.unshift(result);
            saveHistory();
            renderHistory();

            // フォームをリセット
            document.getElementById('name').value = '';
            document.getElementById('sellingPrice').value = '';
            document.getElementById('optionPrice').value = '';
            document.getElementById('unitCost').value = '';
            document.getElementById('containerCount').value = '';
            document.getElementById('containerPrice').value = '';
            document.getElementById('equipmentCost').value = '';
            document.getElementById('forecastQuantity').value = '';
        });

        // 履歴を表示
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            const clearBtn = document.getElementById('clearAllBtn');
            const count = document.getElementById('historyCount');

            count.textContent = history.length;

            if (history.length === 0) {
                historyList.innerHTML = '<p class="text-center text-slate-500 py-8">計算履歴がありません</p>';
                clearBtn.classList.add('hidden');
                return;
            }

            clearBtn.classList.remove('hidden');
            historyList.innerHTML = history.map(item => `
                <div class="border border-slate-200 rounded-lg p-4 hover:bg-slate-50 transition-colors cursor-pointer" onclick="loadFromHistory(${item.id})">
                    <div class="flex items-start justify-between mb-3">
                        <div>
                            <p class="font-semibold text-slate-900">${item.name}</p>
                            <p class="text-xs text-slate-500">${item.timestamp}</p>
                        </div>
                        <button class="text-slate-400 hover:text-red-600 transition-colors" onclick="deleteHistory(event, ${item.id})">×</button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-2 text-sm">
                        <div class="bg-orange-50 rounded p-2 text-center">
                            <p class="text-orange-700 text-xs">原価率</p>
                            <p class="font-semibold text-orange-600 break-words">${item.costRate}%</p>
                        </div>
                        <div class="bg-blue-50 rounded p-2 text-center">
                            <p class="text-blue-700 text-xs">損益分岐点</p>
                            <p class="font-semibold text-blue-600 break-words">${item.breakEvenPoint}個</p>
                        </div>
                        ${item.profit !== null ? `
                        <div class="bg-${item.profit >= 0 ? 'green' : 'red'}-50 rounded p-2 text-center">
                            <p class="text-${item.profit >= 0 ? 'green' : 'red'}-700 text-xs">利益</p>
                            <p class="font-semibold text-${item.profit >= 0 ? 'green' : 'red'}-600 break-words">¥${parseInt(item.profit).toLocaleString()}</p>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // 履歴から読み込む
        function loadFromHistory(id) {
            const item = history.find(h => h.id === id);
            if (item) {
                document.getElementById('name').value = item.name;
                document.getElementById('sellingPrice').value = item.selling;
                document.getElementById('optionPrice').value = item.option;
                document.getElementById('unitCost').value = item.unitCost;
                document.getElementById('containerPrice').value = item.containerCost;
                document.getElementById('equipmentCost').value = item.equipment;
                document.getElementById('forecastQuantity').value = item.forecast;
            }
        }

        // 履歴を削除
        function deleteHistory(e, id) {
            e.stopPropagation();
            history = history.filter(h => h.id !== id);
            saveHistory();
            renderHistory();
        }

        // すべての履歴を削除
        document.getElementById('clearAllBtn').addEventListener('click', function() {
            if (confirm('全ての履歴を削除しますか？')) {
                history = [];
                saveHistory();
                renderHistory();
            }
        });

        // 初期化
        loadHistory();
    </script>
</body>
</html>
